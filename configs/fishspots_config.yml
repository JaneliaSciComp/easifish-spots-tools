white_tophat_args:
  radius: 4

psf_estimation_args:
  n_propose_model: 10
  n_spots: 1000
  max_iterations: 1000
  inlier_threshold: 0.4
  min_inliers: 10
  radius: 9

deconvolution_args:
  clip: false
  num_iter: 20
  filter_epsilon: 0.000001

spot_detection_args:
  min_radius: [0.5,0.5,0.5]
  max_radius: [6,6,6]
  num_sigma: 10
  threshold_rel: 0.001
  exclude_border: 0